name: Agent Sync

on:
  pull_request:
  push:

jobs:
  agent-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Run agent sync test
        run: node --test tests/agent-sync.test.mjs
